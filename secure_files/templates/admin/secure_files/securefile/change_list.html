{% extends "admin/change_list.html" %}

{% block content_title %}
{{ block.super }}
<div style="margin-top: 18px;">
  <form id="drag-upload-form" method="post" action="{{ drag_upload_url }}" enctype="multipart/form-data" style="max-width: 760px;">
    {% csrf_token %}
    <div
      id="drag-drop-zone"
      style="border: 2px dashed var(--sfc-moss); border-radius: 20px; padding: 24px; text-align: center; background: linear-gradient(180deg, #fff8eb 0%, #f4edd9 100%); cursor: pointer; box-shadow: 0 16px 30px rgba(50, 64, 36, 0.06);"
    >
      <strong style="font-size: 18px; color: var(--sfc-ink);">Drag and drop files here</strong>
      <div style="margin-top: 8px; color: var(--sfc-muted);">or click to choose files for the protected content library</div>
      <input id="drag-file-input" type="file" name="files" multiple style="display: none;" />
      <div id="drag-file-list" style="margin-top: 12px; font-size: 12px; color: var(--sfc-bark);"></div>
    </div>
    <div style="margin-top: 12px;">
      <button type="submit" class="button default">Upload to Private S3</button>
    </div>
  </form>
</div>
<script>
(function () {
  const zone = document.getElementById('drag-drop-zone');
  const input = document.getElementById('drag-file-input');
  const list = document.getElementById('drag-file-list');

  const renderFiles = (files) => {
    if (!files || files.length === 0) {
      list.textContent = '';
      return;
    }
    const names = Array.from(files).map((f) => f.name).join(', ');
    list.textContent = `Selected: ${names}`;
  };

  zone.addEventListener('click', () => input.click());

  zone.addEventListener('dragover', (e) => {
    e.preventDefault();
    zone.style.background = 'linear-gradient(180deg, #fff2cf 0%, #ecdfb3 100%)';
  });

  zone.addEventListener('dragleave', () => {
    zone.style.background = 'linear-gradient(180deg, #fff8eb 0%, #f4edd9 100%)';
  });

  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.style.background = 'linear-gradient(180deg, #fff8eb 0%, #f4edd9 100%)';
    if (!e.dataTransfer || !e.dataTransfer.files) return;

    const dt = new DataTransfer();
    Array.from(e.dataTransfer.files).forEach((file) => dt.items.add(file));
    input.files = dt.files;
    renderFiles(input.files);
  });

  input.addEventListener('change', () => renderFiles(input.files));
})();
</script>
{% endblock %}
